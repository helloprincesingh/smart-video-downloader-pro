{% extends "base.html" %}

{% block title %}Reset Password - Premium Video Downloader{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="glass-card">
        <h2 style="font-size: 28px; margin-bottom: 8px; text-align: center;">Set New Password</h2>
        <p style="color: var(--text-secondary); font-size: 14px; text-align: center; margin-bottom: 30px;">
            Please enter your new password below.
        </p>

        <form id="resetPasswordForm" action="/reset-password" method="POST">
            <div class="form-group">
                <label for="password">New Password</label>
                <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" required>
            </div>
            
            <div class="form-group" style="margin-bottom: 25px;">
                <label for="confirm_password">Confirm New Password</label>
                <input type="password" id="confirm_password" name="confirm_password" class="form-input" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-primary">Update Password</button>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    // Injected variables for Supabase integration
    window.supabaseUrl = "{{ supabase_url }}";
    window.supabaseAnonKey = "{{ supabase_anon_key }}";
</script>
<script src="{{ url_for('static', filename='js/auth.js') }}"></script>
{% endblock %}
