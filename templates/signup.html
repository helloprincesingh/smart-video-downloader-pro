{% extends "base.html" %}

{% block title %}Sign Up - Premium Video Downloader{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="glass-card">
        <h2 style="font-size: 28px; margin-bottom: 8px; text-align: center; font-family: 'Outfit', sans-serif;">Get Started</h2>
        <p style="color: var(--text-secondary); font-size: 14px; text-align: center; margin-bottom: 30px;">Create a free account to unlock queues, playlist logs, and favorites.</p>

        <form id="signupForm" action="/signup" method="POST">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-input" placeholder="name@example.com" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" required>
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" class="form-input" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-primary">Create Account</button>
        </form>

        <div style="display: flex; align-items: center; gap: 10px; margin: 25px 0;">
            <div style="flex: 1; height: 1px; background: var(--card-border);"></div>
            <span style="font-size: 12px; color: var(--text-secondary);">OR REGISTER WITH</span>
            <div style="flex: 1; height: 1px; background: var(--card-border);"></div>
        </div>

        <button class="btn-google">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google logo" width="16" height="16">
            Google
        </button>

        <div class="auth-footer">
            Already have an account? <a href="/login">Log in</a>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    window.supabaseUrl = "{{ supabase_url }}";
    window.supabaseAnonKey = "{{ supabase_anon_key }}";
</script>
<script src="{{ url_for('static', filename='js/auth.js') }}"></script>
{% endblock %}
